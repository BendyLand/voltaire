<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 100 100"
   width="256"
   height="256"
   version="1.1"
   id="svg8"
   sodipodi:docname="voltaire_logo.svg"
   inkscape:export-filename="voltaire_logo.png"
   inkscape:export-xdpi="96"
   inkscape:export-ydpi="96"
   inkscape:version="1.4.4 (dcaf3e7d9e, 2026-05-05)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs8" />
  <sodipodi:namedview
     id="namedview8"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="0.76367188"
     inkscape:cx="237.66752"
     inkscape:cy="191.18159"
     inkscape:window-width="1920"
     inkscape:window-height="1003"
     inkscape:window-x="3280"
     inkscape:window-y="40"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg8" />
  <!-- 1. Background Rectangle (Must be first to render behind everything) -->
  <rect
     width="100%"
     height="100%"
     fill="#141619"
     id="rect1"
     rx="1.953125"
     x="0"
     y="0"
     ry="1.953125" />
  <!-- 2. Voltaire "Crystalline Garden" Logo -->
  <g
     fill="none"
     stroke="#3bc4a7"
     stroke-width="2"
     stroke-linejoin="round"
     stroke-linecap="round"
     id="g8">
    <!-- Central Hexagon (The Core) -->
    <polygon
       points="45,53 45,47 50,44 55,47 55,53 50,56 "
       fill="#3bc4a7"
       id="polygon1" />
    <!-- 6 Petals Rotated Around the Center (50, 50) -->
    <g
       fill="#3bc4a7"
       fill-opacity="0.15"
       stroke="#3bc4a7"
       stroke-width="2"
       id="g7">
      <polygon
         points="50,12 63,38 50,44 37,38 "
         id="polygon2" />
      <polygon
         points="50,12 63,38 50,44 37,38 "
         transform="rotate(60,50,50)"
         id="polygon3" />
      <polygon
         points="50,12 63,38 50,44 37,38 "
         transform="rotate(120,50,50)"
         id="polygon4" />
      <polygon
         points="50,12 63,38 50,44 37,38 "
         transform="rotate(180,50,50)"
         id="polygon5" />
      <polygon
         points="50,12 63,38 50,44 37,38 "
         transform="rotate(-120,50,50)"
         id="polygon6" />
      <polygon
         points="50,12 63,38 50,44 37,38 "
         transform="rotate(-60,50,50)"
         id="polygon7" />
    </g>
  </g>
</svg>
