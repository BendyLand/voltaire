<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <!-- Background Rectangle (Must be first to render behind everything) -->
  <rect width="100%" height="100%" fill="#141619" />
  <!-- Voltaire "Crystalline Garden" Logo -->
  <g fill="none" stroke="#3bc4a7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- Central Hexagon (The Core) -->
    <polygon points="50,44 55,47 55,53 50,56 45,53 45,47" fill="#3bc4a7" />
    <!-- 6 Petals Rotated Around the Center (50, 50) -->
    <g fill="#3bc4a7" fill-opacity="0.15" stroke="#3bc4a7" stroke-width="2">
      <polygon points="50,12 63,38 50,44 37,38" transform="rotate(0 50 50)" />
      <polygon points="50,12 63,38 50,44 37,38" transform="rotate(60 50 50)" />
      <polygon points="50,12 63,38 50,44 37,38" transform="rotate(120 50 50)" />
      <polygon points="50,12 63,38 50,44 37,38" transform="rotate(180 50 50)" />
      <polygon points="50,12 63,38 50,44 37,38" transform="rotate(240 50 50)" />
      <polygon points="50,12 63,38 50,44 37,38" transform="rotate(300 50 50)" />
    </g>
  </g>
</svg>

